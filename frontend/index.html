<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Basic Info -->
    <title>LambChat</title>
    <meta
      name="description"
      content="A pluggable, multi-tenant AI conversation system. Skills + MCP dual-engine driven, modular by design. SSE streaming, multi-modal document processing, JWT/RBAC auth, and GitHub-synced Skills."
    />
    <meta
      name="keywords"
      content="AI, Agent, LangGraph, Chat, MCP, LLM, AI Assistant, LambChat"
    />
    <meta name="author" content="LambChat" />
    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-video-preview:-1, max-image-preview:large, max-snippet:-1"
    />

    <!-- Theme Color -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1c1917"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/icons/icon-512.png"
    />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="LambChat" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LambChat - AI Agent Platform" />
    <meta property="og:url" content="/" />
    <meta property="og:site_name" content="LambChat" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:description"
      content="A pluggable, multi-tenant AI conversation system. Skills + MCP dual-engine driven, modular by design. SSE streaming, multi-modal document processing, JWT/RBAC auth, and GitHub-synced Skills."
    />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LambChat - AI Agent Platform" />
    <meta
      name="twitter:description"
      content="A pluggable, multi-tenant AI conversation system. Skills + MCP dual-engine driven, modular by design. SSE streaming, multi-modal document processing, JWT/RBAC auth, and GitHub-synced Skills."
    />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Preload critical assets -->
    <link
      rel="preload"
      href="/icons/icon.svg"
      as="image"
      type="image/svg+xml"
      fetchpriority="high"
    />
  </head>

  <body>
    <!-- Inline critical CSS for flash-of-unstyled-content prevention -->
    <style>
      :root {
        --boot-theme-primary: #78716c;
        --boot-theme-border: #e7e5e4;
        --boot-theme-bg: #ffffff;
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      /* Prevent FOUC - show white/dark background immediately */
      body {
        background-color: var(--boot-theme-bg);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --boot-theme-primary: #a8a29e;
          --boot-theme-border: #44403c;
          --boot-theme-bg: #1c1917;
        }
      }

      /* Show loading indicator while JS loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      #root:empty::after {
        content: "";
        width: 32px;
        height: 32px;
        border: 3px solid var(--boot-theme-border);
        border-top-color: var(--boot-theme-primary);
        border-radius: 50%;
        animation: lc-spin 0.6s linear infinite;
        box-shadow: 0 0 0 4px rgb(120 113 108 / 0.08);
      }

      @keyframes lc-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
